<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="ec">
      <!-- Eye almond shape used to clip iris + shadow -->
      <path d="M8,50 Q50,14 92,50 Q50,86 8,50Z"/>
    </clipPath>
  </defs>

  <!-- Sclera (white of the eye) -->
  <path d="M8,50 Q50,14 92,50 Q50,86 8,50Z" fill="#f2f2f2"/>

  <!-- Lower depth shadow (gives the 3-D / metallic look of the logo) -->
  <path d="M8,50 Q50,86 92,50 Q68,70 50,72 Q32,70 8,50Z"
        fill="#bebebe" clip-path="url(#ec)"/>

  <!-- Iris dome — dark charcoal, cúpula apunta arriba, base plana en y=50 -->
  <!-- A20,20 sweep=0 (antihorario) traza la mitad superior del círculo -->
  <path d="M30,50 A20,20 0 0,0 70,50Z"
        fill="#1a1a1a" clip-path="url(#ec)"/>

  <!-- Eye outline -->
  <path d="M8,50 Q50,14 92,50 Q50,86 8,50Z"
        fill="none" stroke="#888" stroke-width="2"/>
</svg>
