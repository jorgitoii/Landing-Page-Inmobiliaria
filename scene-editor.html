<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Lain — Scene Editor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  display:flex; height:100vh; overflow:hidden;
  font-family:monospace; font-size:12px;
  background:#0e1117; color:#ccc;
}
#left-panel {
  width:220px; min-width:220px;
  background:#141820; border-right:1px solid #2a3040;
  display:flex; flex-direction:column; overflow-y:auto;
}
#viewport-wrap { flex:1; position:relative; overflow:hidden; }
#viewport { width:100%; height:100%; display:block; }
#right-panel {
  width:250px; min-width:250px;
  background:#141820; border-left:1px solid #2a3040;
  overflow-y:auto; padding:0;
}
.panel-section { padding:8px 10px; border-bottom:1px solid #2a3040; }
.panel-title {
  font-size:10px; text-transform:uppercase; letter-spacing:0.12em;
  color:#556; margin-bottom:7px; padding-bottom:4px;
  border-bottom:1px solid #2a3040;
}
/* Routes */
.route-item {
  padding:6px 10px; cursor:pointer;
  border-left:2px solid transparent; transition:all 0.15s;
  display:flex; align-items:center; gap:6px;
}
.route-item:hover { background:#1e2535; border-left-color:#7ab4d4; color:#7ab4d4; }
.route-item.active { background:#1a2a38; border-left-color:#7ab4d4; color:#7ab4d4; }
.route-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
/* Outliner */
.outliner-item { border-bottom:1px solid #1e2535; }
.outliner-item.selected > .outliner-header { background:#1a2535; }
.outliner-header {
  display:flex; align-items:center; gap:3px;
  padding:4px 6px; cursor:pointer;
}
.outliner-header:hover { background:#1e2535; }
.outliner-name { flex:1; font-size:11px; }
.btn-tiny {
  background:#1e2535; border:1px solid #3a4560;
  color:#8ab; padding:1px 5px; cursor:pointer; font-size:10px;
  font-family:monospace;
}
.btn-tiny:hover { background:#2a3550; color:#cde; }
.btn-tiny.danger:hover { background:#3a1520; color:#f88; border-color:#844; }
.outliner-extra {
  padding:5px 10px 7px; background:#111720;
  display:flex; flex-direction:column; gap:4px;
}
.extra-row { display:flex; align-items:center; gap:6px; font-size:11px; }
/* Right panel */
.param-row {
  display:flex; align-items:center; margin-bottom:5px; gap:5px;
}
.param-row label { flex:1; font-size:11px; color:#99a; }
/* Lock button per-row — aparece tenue, se resalta al bloquear */
.param-row .btn-tiny { transition: opacity 0.15s, border-color 0.15s; }
.param-row:hover .btn-tiny { opacity: 0.75 !important; }
.param-row input[type=range] { width:80px; accent-color:#7ab4d4; }
.param-row input[type=number] {
  width:58px; background:#1a2030; border:1px solid #3a4560;
  color:#cde; padding:2px 4px; font-family:monospace; font-size:11px;
}
.param-row input[type=checkbox] { width:13px; height:13px; accent-color:#7ab4d4; }
.val-display { width:36px; font-size:10px; color:#7ab4d4; text-align:right; }
/* Editable numeric display — same visual as val-display but writable */
.val-input {
  width:52px; font-size:10px; color:#7ab4d4; text-align:right;
  background:#0c1018; border:1px solid #2a3550;
  padding:1px 4px; font-family:monospace;
  -moz-appearance:textfield;
}
.val-input::-webkit-inner-spin-button,
.val-input::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
.val-input:focus { outline:none; border-color:#7ab4d4; color:#aad4f4; }
.btn-main {
  width:100%; padding:6px 8px; background:#1a2535;
  border:1px solid #4a6a8a; color:#8abcd4;
  cursor:pointer; font-family:monospace; font-size:11px;
  letter-spacing:0.06em; margin-bottom:4px;
}
.btn-main:hover { background:#22334a; color:#aad4f4; }
#export-output {
  width:100%; height:130px; background:#0c1018;
  border:1px solid #2a3040; color:#8fbd80;
  font-size:9px; padding:5px; resize:none; margin-top:4px;
  font-family:monospace;
}
#load-status { font-size:10px; color:#7a9; margin-top:3px; min-height:14px; }
.color-swatch {
  width:24px; height:16px; border:1px solid #445; cursor:pointer;
  border-radius:2px; padding:0;
}
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div id="left-panel">
  <div class="panel-section">
    <div class="panel-title">Rutas de luz</div>
    <div id="route-menu"></div>
    <button class="btn-main" id="btn-all-routes" style="margin-top:6px;opacity:0.7">⊞ Activar todas las rutas</button>
  </div>
  <div class="panel-section" style="flex:1">
    <div class="panel-title">Outliner — Splines</div>
    <button class="btn-tiny" id="btn-add-spline" style="width:100%;margin-bottom:6px;padding:4px">+ Añadir Spline</button>
    <div id="outliner-list"></div>
  </div>
</div>

<!-- VIEWPORT -->
<div id="viewport-wrap">
  <canvas id="viewport"></canvas>
  <!-- Gizmo mode toolbar -->
  <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10">
    <button class="btn-tiny" id="mode-translate" style="padding:3px 8px">↔ Mover</button>
    <button class="btn-tiny" id="mode-rotate"    style="padding:3px 8px">↻ Rotar</button>
    <button class="btn-tiny" id="mode-scale"     style="padding:3px 8px">⤢ Escala</button>
    <button class="btn-tiny" id="mode-deselect"  style="padding:3px 8px">✕ Soltar</button>
  </div>
  <div id="info-bar" style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    font-size:10px;color:#556;pointer-events:none">
    Click punto blanco = editar punto · Click octaedro = mover spline · Click vacío = soltar
  </div>
</div>

<!-- RIGHT PANEL -->
<div id="right-panel">

  <!-- MODELO -->
  <div class="panel-section">
    <div class="panel-title">Modelo GLB</div>
    <input type="file" id="glb-file-input" accept=".glb,.gltf" style="display:none">
    <button class="btn-main" id="btn-load-glb">📂 Cargar GLB / GLTF</button>
    <div id="load-status"></div>
    <button class="btn-main" id="btn-toggle-bg" style="margin-top:6px">◼ Fondo: ON</button>
  </div>

  <!-- ILUMINACIÓN / ESCENA -->
  <div class="panel-section">
    <div class="panel-title">Iluminación / Escena</div>

    <div class="param-row">
      <label>Tone mapping</label>
      <select id="p-tonemapping" style="background:#1a2030;border:1px solid #3a4560;color:#cde;font-family:monospace;font-size:10px;padding:2px 4px;flex:1">
        <option value="aces" selected>ACES Filmic</option>
        <option value="linear">Linear</option>
        <option value="reinhard">Reinhard</option>
        <option value="cineon">Cineon</option>
      </select>
    </div>

    <div class="param-row">
      <label>Ambient</label>
      <input type="range" id="p-ambient" min="0" max="6" step="0.1" value="1.0">
      <input type="number" class="val-input" id="v-ambient" value="1.0" step="any">
    </div>

    <div class="param-row">
      <label>Sol (key)</label>
      <input type="range" id="p-sunint" min="0" max="8" step="0.1" value="2.0">
      <input type="number" class="val-input" id="v-sunint" value="2.0" step="any">
    </div>

    <div class="param-row">
      <label>Relleno</label>
      <input type="range" id="p-fillint" min="0" max="8" step="0.1" value="0.8">
      <input type="number" class="val-input" id="v-fillint" value="0.8" step="any">
    </div>

    <div class="param-row">
      <label>Luz cámara</label>
      <input type="checkbox" id="p-camlight">
      <input type="range" id="p-camlightint" min="0" max="8" step="0.1" value="1.5" style="width:60px">
      <input type="number" class="val-input" id="v-camlightint" value="1.5" step="any">
    </div>
  </div>

  <!-- CÁMARA -->
  <div class="panel-section">
    <div class="panel-title">Órbita</div>
    <div class="param-row">
      <label>Auto-rotar</label>
      <input type="checkbox" id="p-autorotate">
    </div>
    <div class="param-row">
      <label>Vel. rotación</label>
      <input type="range" id="p-rotspeed" min="0.1" max="5" step="0.1" value="0.5">
      <input type="number" class="val-input" id="v-rotspeed" value="0.5" step="any">
    </div>
    <div class="param-row">
      <label>Distancia</label>
      <input type="range" id="p-dist" min="0.5" max="80" step="0.1" value="10">
      <input type="number" class="val-input" id="v-dist" value="10" step="any">
    </div>
    <div class="param-row">
      <label>Azimut (°)</label>
      <input type="range" id="p-azimuth" min="-180" max="180" step="1" value="0">
      <input type="number" class="val-input" id="v-azimuth" value="0" step="any">
    </div>
    <div class="param-row">
      <label>Elevación (°)</label>
      <input type="range" id="p-elevation" min="2" max="88" step="1" value="30">
      <input type="number" class="val-input" id="v-elevation" value="30" step="any">
    </div>
    <div class="param-row">
      <label>Min polar (π×)</label>
      <input type="range" id="p-minpolar" min="0" max="0.49" step="0.01" value="0.18">
      <input type="number" class="val-input" id="v-minpolar" value="0.18" step="any">
    </div>
    <div class="param-row">
      <label>Max polar (π×)</label>
      <input type="range" id="p-maxpolar" min="0.5" max="1" step="0.01" value="0.76">
      <input type="number" class="val-input" id="v-maxpolar" value="0.76" step="any">
    </div>
    <div class="param-row">
      <label>Zoom mín (×d)</label>
      <input type="range" id="p-mindist" min="0.1" max="0.99" step="0.01" value="0.925">
      <input type="number" class="val-input" id="v-mindist" value="0.925" step="any">
    </div>
    <div class="param-row">
      <label>Zoom máx (×d)</label>
      <input type="range" id="p-maxdist" min="1.01" max="5" step="0.01" value="1.075">
      <input type="number" class="val-input" id="v-maxdist" value="1.075" step="any">
    </div>
    <div class="param-row">
      <label>Damping</label>
      <input type="range" id="p-damping" min="0.01" max="0.3" step="0.01" value="0.07">
      <input type="number" class="val-input" id="v-damping" value="0.07" step="any">
    </div>
    <div class="param-row">
      <label>Exposure</label>
      <input type="range" id="p-exposure" min="0.2" max="3" step="0.05" value="1.2">
      <input type="number" class="val-input" id="v-exposure" value="1.2" step="any">
    </div>
    <div class="param-row">
      <label>Alt. cam (×h)</label>
      <input type="range" id="p-camheight" min="-0.5" max="0.5" step="0.01" value="0.08">
      <input type="number" class="val-input" id="v-camheight" value="0.08" step="any">
    </div>
  </div>

  <!-- TARGET -->
  <div class="panel-section">
    <div class="panel-title">Target de órbita</div>
    <div class="param-row"><label>X</label><input type="number" id="p-tx" value="-0.2254" step="0.001"></div>
    <div class="param-row"><label>Y</label><input type="number" id="p-ty" value="-0.2005" step="0.001"></div>
    <div class="param-row"><label>Z</label><input type="number" id="p-tz" value="0.6414" step="0.001"></div>
    <button class="btn-main" id="btn-snap" style="margin-top:4px">⊙ Centrar en modelo</button>
  </div>

  <!-- PARTÍCULAS GLOBAL -->
  <div class="panel-section">
    <div class="panel-title">Partículas — Global</div>
    <div class="param-row">
      <label>Forma</label>
      <select id="g-pshape" style="background:#1a2030;border:1px solid #3a4560;color:#cde;font-family:monospace;font-size:10px;padding:2px 4px;flex:1">
        <option value="circle">circle</option>
        <option value="square">square</option>
        <option value="sphere">sphere</option>
        <option value="cube">cube</option>
      </select>
    </div>
    <div class="param-row">
      <label>Flujo</label>
      <input type="checkbox" id="g-pflux">
    </div>
    <div class="param-row">
      <label>Vel. flujo</label>
      <input type="range" id="g-pflowspd" min="0.01" max="3" step="0.01" value="0.15">
      <input type="number" class="val-input" id="gv-pflowspd" value="0.15" step="any">
    </div>
    <div class="param-row">
      <label>Tamaño</label>
      <input type="range" id="g-psize" min="0.005" max="0.3" step="0.005" value="0.04">
      <input type="number" class="val-input" id="gv-psize" value="0.04" step="any">
    </div>
    <div class="param-row">
      <label>Dispersión</label>
      <input type="range" id="g-pscatter" min="0" max="0.5" step="0.005" value="0.025">
      <input type="number" class="val-input" id="gv-pscatter" value="0.025" step="any">
    </div>
    <div class="param-row">
      <label>Esparcimiento</label>
      <input type="range" id="g-pcount" min="20" max="1000" step="10" value="250">
      <input type="number" class="val-input" id="gv-pcount" value="250" step="any">
    </div>
  </div>

  <!-- BLOOM -->
  <div class="panel-section">
    <div class="panel-title">Bloom (post-proceso)</div>
    <div class="param-row">
      <label>Intensidad</label>
      <input type="range" id="b-strength" min="0" max="4" step="0.05" value="1.5">
      <input type="number" class="val-input" id="bv-strength" value="1.5" step="any">
    </div>
    <div class="param-row">
      <label>Radio</label>
      <input type="range" id="b-radius" min="0" max="1.5" step="0.05" value="0.6">
      <input type="number" class="val-input" id="bv-radius" value="0.6" step="any">
    </div>
    <div class="param-row">
      <label>Umbral lum.</label>
      <input type="range" id="b-threshold" min="0" max="1" step="0.01" value="0.2">
      <input type="number" class="val-input" id="bv-threshold" value="0.2" step="any">
    </div>
  </div>

  <!-- EXPORT -->
  <div class="panel-section">
    <div class="panel-title">Exportar → Landing Page</div>
    <button class="btn-main" id="btn-export">⬇ Generar código</button>
    <textarea id="export-output" readonly placeholder="Código para LocationSection.vue..."></textarea>
    <button class="btn-main" id="btn-copy" style="margin-top:3px">⧉ Copiar al portapapeles</button>
  </div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
    "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js",
    "three/examples/jsm/controls/TransformControls": "https://unpkg.com/three@0.128.0/examples/jsm/controls/TransformControls.js",
    "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.128.0/examples/jsm/loaders/GLTFLoader.js",
    "three/examples/jsm/postprocessing/EffectComposer": "https://unpkg.com/three@0.128.0/examples/jsm/postprocessing/EffectComposer.js",
    "three/examples/jsm/postprocessing/RenderPass": "https://unpkg.com/three@0.128.0/examples/jsm/postprocessing/RenderPass.js",
    "three/examples/jsm/postprocessing/UnrealBloomPass": "https://unpkg.com/three@0.128.0/examples/jsm/postprocessing/UnrealBloomPass.js",
    "three/examples/jsm/postprocessing/ShaderPass": "https://unpkg.com/three@0.128.0/examples/jsm/postprocessing/ShaderPass.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three'
import { OrbitControls }    from 'three/examples/jsm/controls/OrbitControls'
import { TransformControls } from 'three/examples/jsm/controls/TransformControls'
import { GLTFLoader }        from 'three/examples/jsm/loaders/GLTFLoader'
import { EffectComposer }   from 'three/examples/jsm/postprocessing/EffectComposer'
import { RenderPass }       from 'three/examples/jsm/postprocessing/RenderPass'
import { UnrealBloomPass }  from 'three/examples/jsm/postprocessing/UnrealBloomPass'
import { ShaderPass }       from 'three/examples/jsm/postprocessing/ShaderPass'

// ═══════════════════════════════════════════════════
//  RENDERER & SCENE
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('viewport')
const wrap   = document.getElementById('viewport-wrap')

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true })
renderer.setPixelRatio(Math.min(devicePixelRatio, 2))
renderer.toneMapping = THREE.ACESFilmicToneMapping
renderer.toneMappingExposure = 1.2
renderer.shadowMap.enabled = false

const scene = new THREE.Scene()
scene.background = new THREE.Color(0x090d14)
scene.add(new THREE.GridHelper(20, 20, 0x1e2a3a, 0x14202e))

const camera = new THREE.PerspectiveCamera(40, 1, 0.001, 5000)
camera.position.set(0, 5, 10)

// Lights
const ambientLight = new THREE.AmbientLight(0xc8e0f0, 1.0)
scene.add(ambientLight)
const sun = new THREE.DirectionalLight(0xe8f4ff, 2.0)
sun.position.set(5, 10, 7); scene.add(sun)
const fill = new THREE.DirectionalLight(0x8ab8d4, 0.8)
fill.position.set(-5, 3, -5); scene.add(fill)
// Luz de cámara — sigue la posición de la cámara, apunta al target
const camLight = new THREE.DirectionalLight(0xe8f4ff, 0)
scene.add(camLight)

// ── Selective Bloom ──────────────────────────────────────────────────
// bloomComposer : renderiza SOLO los objetos emissivos (modelo ennegrecido)
//                → produce la textura de glow
// finalComposer : render normal completo + mezcla aditiva del glow
// ────────────────────────────────────────────────────────────────────
const _blackMat  = new THREE.MeshBasicMaterial({ color: 0x000000 })
const _savedMats = new Map()

function _darkifyScene () {
  // Ocultar grid
  scene.children.forEach(c => {
    if (c.isGridHelper) { c.userData._gv = c.visible; c.visible = false }
  })
  // Ennegrecer modelo GLB
  if (modelObj) {
    modelObj.traverse(obj => {
      if (obj.isMesh) { _savedMats.set(obj, obj.material); obj.material = _blackMat }
    })
  }
  // Ennegrecer puntos de control y pivot (esferas blancas / octaedro dorado)
  if (typeof splines !== 'undefined') {
    splines.forEach(sp => {
      ;[...sp.pointMeshes, sp.pivotMesh].forEach(m => {
        if (m?.visible) { _savedMats.set(m, m.material); m.material = _blackMat }
      })
    })
  }
  // Ocultar gizmo de transformación
  if (typeof tf !== 'undefined') tf.visible = false
}

function _restoreScene () {
  scene.children.forEach(c => {
    if (c.isGridHelper && c.userData._gv !== undefined) {
      c.visible = c.userData._gv; delete c.userData._gv
    }
  })
  _savedMats.forEach((mat, obj) => { obj.material = mat })
  _savedMats.clear()
  if (typeof tf !== 'undefined') tf.visible = true
}

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.5,   // strength
  0.6,   // radius
  0.20   // threshold
)

// Composer 1: solo emissivos → textura de bloom (no se muestra en pantalla)
const bloomComposer = new EffectComposer(renderer)
bloomComposer.renderToScreen = false
bloomComposer.addPass(new RenderPass(scene, camera))
bloomComposer.addPass(bloomPass)

// Composer 2: escena completa + bloom superpuesto (aditivO)
const mixPass = new ShaderPass(new THREE.ShaderMaterial({
  uniforms: {
    baseTexture:  { value: null },
    bloomTexture: { value: bloomComposer.renderTarget2.texture }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
  `,
  fragmentShader: `
    uniform sampler2D baseTexture;
    uniform sampler2D bloomTexture;
    varying vec2 vUv;
    void main() {
      gl_FragColor = texture2D(baseTexture, vUv) + texture2D(bloomTexture, vUv);
    }
  `
}), 'baseTexture')
mixPass.needsSwap = true

const finalComposer = new EffectComposer(renderer)
finalComposer.addPass(new RenderPass(scene, camera))
finalComposer.addPass(mixPass)

// Orbit
const orbit = new OrbitControls(camera, renderer.domElement)
orbit.enableDamping    = true
orbit.dampingFactor    = 0.07
orbit.autoRotate       = false
orbit.autoRotateSpeed  = 0.5
orbit.minPolarAngle    = Math.PI * 0.18
orbit.maxPolarAngle    = Math.PI * 0.76
orbit.target.set(-0.2254, -0.2005, 0.6414)

// Transform gizmo (one at a time)
const tf = new TransformControls(camera, renderer.domElement)
tf.setMode('translate')
tf.addEventListener('dragging-changed', e => { orbit.enabled = !e.value })
scene.add(tf)

// ═══════════════════════════════════════════════════
//  SPLINE CLASS
// ═══════════════════════════════════════════════════
const ROUTE_COLORS = ['#7ab4d4','#d47a7a','#7ad4a0','#d4c47a','#b47ad4']

// ── Configuración global de partículas ────────────────
const PG = {
  shape: 'circle', flow: false, flowSpeed: 0.15,
  size: 0.04, scatter: 0.025, count: 250
}

// ── Texturas de sprite para partículas 2D ──────────────
function makeSpriteTex (shape) {
  const S = 64, cv = document.createElement('canvas')
  cv.width = cv.height = S
  const ctx = cv.getContext('2d')
  ctx.fillStyle = 'white'
  if (shape === 'circle') {
    ctx.beginPath(); ctx.arc(S/2, S/2, S/2 - 1, 0, Math.PI * 2); ctx.fill()
  } else {
    ctx.fillRect(0, 0, S, S)
  }
  return new THREE.CanvasTexture(cv)
}
const SPRITE_CIRCLE = makeSpriteTex('circle')
const SPRITE_SQUARE = makeSpriteTex('square')

class SplineObj {
  constructor (name, hexColor) {
    this.id        = Math.random().toString(36).slice(2,8)
    this.name      = name
    this.locked    = false
    this.lightOn   = false
    this.color     = hexColor || '#7ab4d4'
    this.intensity = 1.5
    this.group     = new THREE.Group()

    // Default 4 control points
    this.points = [
      new THREE.Vector3(-2,  0.5,  0),
      new THREE.Vector3(-0.6, 1.4, 0),
      new THREE.Vector3( 0.6, 1.4, 0),
      new THREE.Vector3( 2,  0.5,  0),
    ]

    this.tubeMesh      = null
    this.pointMeshes   = []
    this.pivotMesh     = null
    this.lights        = []
    this.particleOn    = false
    this.particleSpeed = 0.18
    this.particleCount       = 250
    this.particleScatter     = 0.025   // scatter radius around curve
    this.particleSize        = 0.04    // PointsMaterial.size / InstancedMesh scale
    this.particleShape       = 'circle' // 'circle' | 'square' | 'sphere' | 'cube'
    this.particleFlow        = false
    this.particleFlowSpeed   = 0.15
    this.particlePoints      = null    // THREE.Points or THREE.InstancedMesh
    this._curve              = null    // cached CatmullRomCurve3 (for flow)
    this._particleTValues    = null    // Float32Array — t-param per particle
    this._particleOffsets    = null    // Float32Array — baked scatter offsets
    this._dummy              = new THREE.Object3D()  // reused for InstancedMesh
    this.exposure            = 1.8     // emissiveIntensity when light is on (alto para disparar bloom)

    scene.add(this.group)
    this._rebuildTube()
    this._rebuildPoints()
    this._rebuildPivot()
  }

  // ── Tube ──────────────────────────────────
  _rebuildTube () {
    if (this.tubeMesh) { this.group.remove(this.tubeMesh); this.tubeMesh.geometry.dispose() }
    const curve   = new THREE.CatmullRomCurve3(this.points)
    this._curve   = curve   // caché para flujo de partículas
    const geo     = new THREE.TubeGeometry(curve, 80, 0.018, 8, false)
    const threeColor = new THREE.Color(this.color)
    const mat     = new THREE.MeshStandardMaterial({
      color: threeColor, emissive: threeColor,
      emissiveIntensity: this.lightOn ? 0.9 : 0.35,
      roughness: 0.4, metalness: 0.1
    })
    this.tubeMesh = new THREE.Mesh(geo, mat)
    this.tubeMesh.userData = { splineId: this.id, isTube: true }
    this.tubeMesh.visible = !this.particleOn   // oculto si partículas activas
    this.group.add(this.tubeMesh)
    this._rebuildLights()
    this._refreshParticlesIfActive()
  }

  // ── Control points (white spheres) ────────
  _rebuildPoints () {
    this.pointMeshes.forEach(m => this.group.remove(m))
    this.pointMeshes = this.points.map((p, i) => {
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(0.065, 10, 7),
        new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xeeeeee, emissiveIntensity: 0.5 })
      )
      m.position.copy(p)
      m.userData = { splineId: this.id, isPoint: true, pointIdx: i }
      m.visible = !(this.lightOn || this.particleOn)
      this.group.add(m)
      return m
    })
  }

  // ── Pivot (golden octahedron at centroid) ──
  _rebuildPivot () {
    if (this.pivotMesh) this.group.remove(this.pivotMesh)
    const center = this._centroid()
    const m = new THREE.Mesh(
      new THREE.OctahedronGeometry(0.11),
      new THREE.MeshStandardMaterial({ color: 0xffaa22, emissive: 0xffaa22, emissiveIntensity: 0.7 })
    )
    m.position.copy(center)
    m.userData = { splineId: this.id, isPivot: true }
    m.visible = !(this.lightOn || this.particleOn)
    this.pivotMesh = m
    this.group.add(m)
  }

  // ── Lights along spline ────────────────────
  // PointLights eliminados — el glow viene de UnrealBloomPass.
  // El material emissivo del tubo activa el bloom cuando supera el umbral.
  _rebuildLights () {
    this.lights.forEach(l => this.group.remove(l))
    this.lights = []
    // No-op: sin PointLights
  }

  _centroid () {
    return this.points
      .reduce((a, b) => a.clone().add(b), new THREE.Vector3())
      .divideScalar(this.points.length)
  }

  // ── Public API ─────────────────────────────
  setColor (hex) {
    this.color = hex
    if (this.tubeMesh) {
      const c = new THREE.Color(hex)
      this.tubeMesh.material.color.copy(c)
      this.tubeMesh.material.emissive.copy(c)
    }
    this.lights.forEach(l => l.color.set(hex))
  }

  setLightOn (on) {
    this.lightOn = on
    if (this.tubeMesh) this.tubeMesh.material.emissiveIntensity = on ? this.exposure : 0.35
    // Cuando hay luz activa, los puntos de control se ocultan —
    // solo el camino/partículas actúan como emisor visual
    this._syncControlPointsVisibility()
    this._rebuildLights()
  }

  _syncControlPointsVisibility () {
    const hide = this.lightOn || this.particleOn
    this.pointMeshes.forEach(m => { m.visible = !hide })
    if (this.pivotMesh) this.pivotMesh.visible = !hide
  }

  setIntensity (v) {
    this.intensity = v
    this.lights.forEach(l => l.intensity = v)
  }

  setExposure (v) {
    this.exposure = v
    if (this.tubeMesh && this.lightOn)
      this.tubeMesh.material.emissiveIntensity = v
  }

  hover (on) {
    if (this.tubeMesh)
      this.tubeMesh.material.emissiveIntensity = on ? 1.4 : (this.lightOn ? this.exposure : 0.35)
  }

  // ── Particle system ────────────────────────
  // Las partículas CUBREN el camino del spline de forma estática y densa.
  // El tubo se oculta; las partículas toman su rol visual + emisión de luz.
  setParticleOn (on) {
    this.particleOn = on
    if (!on) {
      if (this.particlePoints) {
        this.group.remove(this.particlePoints)
        this.particlePoints.geometry.dispose()
        if (this.particlePoints.material) this.particlePoints.material.dispose()
        this.particlePoints = null
      }
      if (this.tubeMesh) this.tubeMesh.visible = true
      this._syncControlPointsVisibility()
      return
    }
    // Aplicar configuración global antes de construir
    this.particleShape     = PG.shape
    this.particleFlow      = PG.flow
    this.particleFlowSpeed = PG.flowSpeed
    this.particleSize      = PG.size
    this.particleScatter   = PG.scatter
    this.particleCount     = PG.count
    this._buildParticles()
    this._syncControlPointsVisibility()
  }

  _buildParticles () {
    if (this.particlePoints) {
      this.group.remove(this.particlePoints)
      this.particlePoints.geometry.dispose()
      if (this.particlePoints.material) this.particlePoints.material.dispose()
      this.particlePoints = null
    }
    if (this.tubeMesh) this.tubeMesh.visible = false

    const curve   = this._curve || new THREE.CatmullRomCurve3(this.points)
    const N       = this.particleCount
    const scatter = this.particleScatter
    const col     = new THREE.Color(this.color)

    // t-values aleatorios → flujo se ve como stream de puntos individuales
    // scatter baked → cada partícula mantiene su offset radial mientras fluye
    this._particleTValues = new Float32Array(N)
    this._particleOffsets = new Float32Array(N * 3)
    for (let i = 0; i < N; i++) {
      this._particleTValues[i]     = Math.random()
      this._particleOffsets[i*3]   = (Math.random() - 0.5) * scatter
      this._particleOffsets[i*3+1] = (Math.random() - 0.5) * scatter
      this._particleOffsets[i*3+2] = (Math.random() - 0.5) * scatter
    }

    if (this.particleShape === 'sphere' || this.particleShape === 'cube') {
      // ── Instanced 3D mesh ────────────────────────────
      const r   = this.particleSize * 0.5
      const geo = this.particleShape === 'sphere'
        ? new THREE.SphereGeometry(r, 4, 3)
        : new THREE.BoxGeometry(r, r, r)
      const mat = new THREE.MeshStandardMaterial({
        color: col, emissive: col, emissiveIntensity: 0.9,
        transparent: true, opacity: 0.85,
        depthTest: false, depthWrite: false
      })
      const mesh = new THREE.InstancedMesh(geo, mat, N)
      mesh.userData.splineId = this.id
      mesh.renderOrder = 999
      for (let i = 0; i < N; i++) {
        const pt = curve.getPoint(this._particleTValues[i])
        this._dummy.position.set(
          pt.x + this._particleOffsets[i*3],
          pt.y + this._particleOffsets[i*3+1],
          pt.z + this._particleOffsets[i*3+2]
        )
        this._dummy.updateMatrix()
        mesh.setMatrixAt(i, this._dummy.matrix)
      }
      mesh.instanceMatrix.needsUpdate = true
      this.particlePoints = mesh

    } else {
      // ── 2D sprites (circle / square) ─────────────────
      const pos = new Float32Array(N * 3)
      for (let i = 0; i < N; i++) {
        const pt = curve.getPoint(this._particleTValues[i])
        pos[i*3]   = pt.x + this._particleOffsets[i*3]
        pos[i*3+1] = pt.y + this._particleOffsets[i*3+1]
        pos[i*3+2] = pt.z + this._particleOffsets[i*3+2]
      }
      const geo = new THREE.BufferGeometry()
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3))
      const mat = new THREE.PointsMaterial({
        color: col,
        size: this.particleSize,
        map:       this.particleShape === 'circle' ? SPRITE_CIRCLE : SPRITE_SQUARE,
        alphaTest: 0,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.92,
        blending: THREE.AdditiveBlending,
        depthTest:  false,
        depthWrite: false
      })
      this.particlePoints = new THREE.Points(geo, mat)
      this.particlePoints.userData.splineId = this.id
      this.particlePoints.renderOrder = 999
    }
    this.group.add(this.particlePoints)
  }

  tickParticles (dt) {
    if (!this.particleFlow || !this.particlePoints || !this._particleTValues || !this._curve) return
    const N   = this._particleTValues.length
    const spd = this.particleFlowSpeed

    // Advance each particle's position along the curve
    for (let i = 0; i < N; i++) {
      this._particleTValues[i] = (this._particleTValues[i] + spd * dt) % 1
    }

    const isInst = this.particlePoints.isInstancedMesh
    const posAttr = isInst ? null : this.particlePoints.geometry.attributes.position

    for (let i = 0; i < N; i++) {
      const pt = this._curve.getPoint(this._particleTValues[i])
      const x  = pt.x + this._particleOffsets[i*3]
      const y  = pt.y + this._particleOffsets[i*3+1]
      const z  = pt.z + this._particleOffsets[i*3+2]
      if (isInst) {
        this._dummy.position.set(x, y, z)
        this._dummy.updateMatrix()
        this.particlePoints.setMatrixAt(i, this._dummy.matrix)
      } else {
        posAttr.setXYZ(i, x, y, z)
      }
    }

    if (isInst) this.particlePoints.instanceMatrix.needsUpdate = true
    else         posAttr.needsUpdate = true
  }

  // Reconstruir partículas cuando la curva cambia (llamado desde _rebuildTube)
  _refreshParticlesIfActive () {
    if (this.particleOn) this._buildParticles()
  }

  addPoint () {
    const last = this.points[this.points.length - 1].clone()
    const prev = this.points.length > 1 ? this.points[this.points.length - 2] : last
    const dir  = last.clone().sub(prev).normalize().multiplyScalar(0.8)
    if (dir.length() < 0.001) dir.set(0.8, 0, 0)
    this.points.push(last.clone().add(dir))
    this._rebuildTube()
    this._rebuildPoints()
    this._rebuildPivot()
  }

  syncPointFromMesh (idx) {
    // After tf gizmo moves a point mesh, sync back
    const worldPos = new THREE.Vector3()
    this.pointMeshes[idx].getWorldPosition(worldPos)
    // Convert to group-local space
    this.group.worldToLocal(worldPos)
    this.points[idx].copy(worldPos)
    this._rebuildTube()
    this._rebuildPivot()
  }

  dispose () {
    tf.detach()
    scene.remove(this.group)
  }
}

// ═══════════════════════════════════════════════════
//  OUTLINER
// ═══════════════════════════════════════════════════
function renderOutliner () {
  const list = document.getElementById('outliner-list')
  list.innerHTML = ''

  splines.forEach((sp, idx) => {
    const wrap = document.createElement('div')
    wrap.className = 'outliner-item' + (sp === selSpline ? ' selected' : '')

    // Header row
    const hdr = document.createElement('div')
    hdr.className = 'outliner-header'

    const dot = document.createElement('span')
    dot.style.cssText = `width:8px;height:8px;border-radius:50%;background:${sp.color};flex-shrink:0`

    const name = document.createElement('span')
    name.className = 'outliner-name'
    name.textContent = sp.name
    name.onclick = () => selectSpline(sp)

    const lockBtn = document.createElement('button')
    lockBtn.className = 'btn-tiny'
    lockBtn.textContent = sp.locked ? '🔒' : '🔓'
    lockBtn.title = sp.locked ? 'Desbloquear' : 'Bloquear'
    lockBtn.onclick = () => { sp.locked = !sp.locked; renderOutliner() }

    const addPt = document.createElement('button')
    addPt.className = 'btn-tiny'
    addPt.textContent = '+pt'
    addPt.title = 'Añadir punto de control'
    addPt.onclick = () => { sp.addPoint(); renderOutliner() }

    const del = document.createElement('button')
    del.className = 'btn-tiny danger'
    del.textContent = '✕'
    del.onclick = () => {
      sp.dispose()
      splines.splice(idx, 1)
      if (selSpline === sp) { selSpline = null; selPointIdx = null }
      renderOutliner()
    }

    hdr.append(dot, name, lockBtn, addPt, del)
    wrap.append(hdr)

    // Extra (only when locked)
    if (sp.locked) {
      const extra = document.createElement('div')
      extra.className = 'outliner-extra'

      const mkRow  = () => { const d = document.createElement('div'); d.className = 'extra-row'; return d }
      const mkLbl  = t  => { const s = document.createElement('label'); s.textContent = t; return s }
      const mkVal  = v  => { const s = document.createElement('span'); s.style.cssText='font-size:10px;color:#7ab4d4;width:30px;text-align:right'; s.textContent=v; return s }
      const mkSlider = (min,max,step,val,w) => { const i=document.createElement('input'); i.type='range'; i.min=min; i.max=max; i.step=step; i.value=val; i.style.width=w||'70px'; return i }

      // ── Luz activa ──
      const r1 = mkRow()
      const chk = document.createElement('input'); chk.type='checkbox'; chk.checked=sp.lightOn
      chk.onchange = () => { sp.setLightOn(chk.checked); renderOutliner() }
      r1.append(chk, mkLbl('Luz activa'))

      // ── Color ──
      const r2 = mkRow()
      const col = document.createElement('input'); col.type='color'; col.value=sp.color; col.className='color-swatch'
      col.oninput = () => sp.setColor(col.value)
      r2.append(mkLbl('Color'), col)

      // ── Exposición (emissive del tubo) ──
      const r3 = mkRow()
      const expSl = mkSlider('0','4','0.05', sp.exposure)
      const expVal = mkVal(sp.exposure.toFixed(2))
      expSl.oninput = () => { sp.setExposure(parseFloat(expSl.value)); expVal.textContent=parseFloat(expSl.value).toFixed(2) }
      r3.append(mkLbl('Exposición'), expSl, expVal)

      // ── Intensidad de luz ──
      const r4 = mkRow()
      const intSl = mkSlider('0','8','0.1', sp.intensity)
      const intVal = mkVal(sp.intensity.toFixed(1))
      intSl.oninput = () => { sp.setIntensity(parseFloat(intSl.value)); intVal.textContent=parseFloat(intSl.value).toFixed(1) }
      r4.append(mkLbl('Intensidad luz'), intSl, intVal)

      // ── Sistema partículas ──
      const r5 = mkRow()
      const pChk = document.createElement('input'); pChk.type='checkbox'; pChk.checked=sp.particleOn
      pChk.onchange = () => { sp.setParticleOn(pChk.checked); renderOutliner() }
      r5.append(pChk, mkLbl('Partículas'))

      extra.append(r1, r2, r3, r4, r5)
      wrap.append(extra)
    }

    list.append(wrap)
  })
}

function selectSpline (sp) {
  selSpline    = sp
  selPointIdx  = null
  tf.attach(sp.pivotMesh)
  renderOutliner()
}

// ═══════════════════════════════════════════════════
//  ROUTE MENU
// ═══════════════════════════════════════════════════
let activeRouteIdx = -1   // todo apagado al inicio

// ── Sistema de transición bidireccional ──────────────
// dir:'in'  → aparece gradualmente (emissive, luces, partículas)
// dir:'out' → desaparece gradualmente, luego group.visible=false
const fadeAnimations = []
const FADE_SPEED = 2.5   // unidades/segundo

function _cancelFade (sp) {
  const idx = fadeAnimations.findIndex(f => f.sp === sp)
  if (idx >= 0) fadeAnimations.splice(idx, 1)
}

function startFadeIn (sp) {
  _cancelFade(sp)
  sp.group.visible = true
  // Partir desde 0
  if (sp.tubeMesh) sp.tubeMesh.material.emissiveIntensity = 0
  sp.lights.forEach(l => { l.intensity = 0 })
  if (sp.particlePoints?.material) sp.particlePoints.material.opacity = 0
  fadeAnimations.push({ sp, dir: 'in' })
}

function startFadeOut (sp) {
  _cancelFade(sp)
  fadeAnimations.push({ sp, dir: 'out' })
}

function buildRouteMenu () {
  const menu = document.getElementById('route-menu')
  menu.innerHTML = ''
  splines.slice(0, 5).forEach((sp, i) => {
    const el = document.createElement('div')
    el.className = 'route-item' + (activeRouteIdx === i ? ' active' : '')
    el.innerHTML = `<span class="route-dot" style="background:${sp.color}"></span> ${sp.name}`
    el.addEventListener('mouseenter', () => { if (activeRouteIdx !== i) sp.hover(true) })
    el.addEventListener('mouseleave', () => { if (activeRouteIdx !== i) sp.hover(false) })
    el.addEventListener('click', () => {
      // Fade-out de la ruta anterior
      if (activeRouteIdx >= 0 && activeRouteIdx !== i && splines[activeRouteIdx]) {
        const prev = splines[activeRouteIdx]
        prev.lightOn = false
        startFadeOut(prev)
      }
      activeRouteIdx = i
      // Activar luz si aplica (crea PointLights al valor target; fade-in parte desde 0)
      if (sp.locked && sp._savedLightOn) sp.setLightOn(true)
      // Fade-in de la nueva ruta (emissive, luces y partículas desde 0)
      startFadeIn(sp)
      selectSpline(sp)
      buildRouteMenu()
      renderOutliner()
      const btnAll = document.getElementById('btn-all-routes')
      if (btnAll) { btnAll.style.opacity = '1'; btnAll.style.borderColor = '#7ab4d4' }
    })
    menu.append(el)
  })
}
buildRouteMenu()

// ── Activar todas las rutas ──────────────────────
document.getElementById('btn-all-routes').onclick = () => {
  activeRouteIdx = -1
  splines.forEach(s => {
    if (s.locked && s._savedLightOn) s.setLightOn(true)
    startFadeIn(s)
  })
  buildRouteMenu()
  renderOutliner()
  const btn = document.getElementById('btn-all-routes')
  btn.style.opacity = '0.7'; btn.style.borderColor = ''
}


// ═══════════════════════════════════════════════════
//  LOCK INDIVIDUAL POR PARÁMETRO (Órbita + Target)
//  Bloquea el slider Y enforce en el render loop:
//  el mouse no puede mover un parámetro bloqueado.
// ═══════════════════════════════════════════════════

// Valores bloqueados que se restauran cada frame
// Clave → valor numérico (ángulo en grados o unidades)
const paramLocks = {}

// Mapa: id del input → clave en paramLocks
const ENFORCE_MAP = {
  'p-dist':      'dist',
  'p-azimuth':   'azimuth',
  'p-elevation': 'elevation',
  'p-tx': 'tx',  'p-ty': 'ty',  'p-tz': 'tz'
}

;['Órbita', 'Target'].forEach(keyword => {
  const section = [...document.querySelectorAll('#right-panel .panel-section')].find(s => {
    const t = s.querySelector('.panel-title')
    return t && t.textContent.includes(keyword)
  })
  if (!section) return

  section.querySelectorAll('.param-row').forEach(row => {
    const controls = [...row.querySelectorAll('input, select, button')]
    if (!controls.length) return

    const btn = document.createElement('button')
    btn.className   = 'btn-tiny'
    btn.textContent = '🔓'
    btn.title       = 'Bloquear parámetro (también bloquea el mouse)'
    btn.style.cssText = 'padding:0 3px;flex-shrink:0;font-size:10px;opacity:0.5'

    let locked = false
    btn.addEventListener('click', () => {
      locked = !locked
      btn.textContent   = locked ? '🔒' : '🔓'
      btn.style.opacity = locked ? '1'   : '0.5'
      btn.style.borderColor = locked ? '#d47a7a' : ''

      // Deshabilitar/habilitar el slider
      controls.forEach(c => {
        c.disabled          = locked
        c.style.opacity     = locked ? '0.3' : ''
        c.style.pointerEvents = locked ? 'none' : ''
      })

      // Registrar o eliminar el lock de enforcement
      const mainInput = controls.find(c => c.id && ENFORCE_MAP[c.id])
      if (mainInput) {
        const key = ENFORCE_MAP[mainInput.id]
        if (locked) {
          paramLocks[key] = parseFloat(mainInput.value)
        } else {
          delete paramLocks[key]
        }
      }
    })

    row.appendChild(btn)
  })
})

// ═══════════════════════════════════════════════════
//  PARTICLE GLOBALS — wiring

function _applyPGToSpline (sp) {
  sp.particleShape     = PG.shape
  sp.particleFlow      = PG.flow
  sp.particleFlowSpeed = PG.flowSpeed
  sp.particleSize      = PG.size
  sp.particleScatter   = PG.scatter
  sp.particleCount     = PG.count
  if (sp.particleOn) sp._buildParticles()
}
function syncPG () { splines.forEach(_applyPGToSpline) }

document.getElementById('g-pshape').onchange = e => { PG.shape = e.target.value; syncPG() }
document.getElementById('g-pflux').onchange  = e => { PG.flow  = e.target.checked; syncPG() }

  ['g-pflowspd','gv-pflowspd','flowSpeed', v => v.toFixed(2), false],

  ['g-pscatter','gv-pscatter','scatter',   v => v.toFixed(3), false],
  ['g-pcount',  'gv-pcount',  'count',     v => String(v),    true ],
].forEach(([id, dispId, key, fmt, isInt]) => {
  const range = document.getElementById(id)
  const disp  = document.getElementById(dispId)

  // Slider → número

  }
  range.addEventListener('input', fromSlider)

  // Número tipeado → slider
  const commit = () => {
    let v = isInt ? parseInt(disp.value) : parseFloat(disp.value)
    if (isNaN(v)) return
    const mn = parseFloat(range.min), mx = parseFloat(range.max)
    v = Math.max(mn, Math.min(mx, v))
    range.value = v
    PG[key] = v
    disp.value = parseFloat(fmt(v))
    syncPG()
  }
  disp.addEventListener('change',  commit)
  disp.addEventListener('keydown', e => { if (e.key === 'Enter') { commit(); disp.blur() } })
})

// ═══════════════════════════════════════════════════
//  RAYCASTER — click to select
// ═══════════════════════════════════════════════════
const ray   = new THREE.Raycaster()
const mouse = new THREE.Vector2()

canvas.addEventListener('click', e => {
  if (tf.dragging) return
  const rect = canvas.getBoundingClientRect()
  mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1
  ray.setFromCamera(mouse, camera)

  const pickable = []
  splines.forEach(sp => {
    pickable.push(...sp.pointMeshes, sp.pivotMesh)
  })

  const hits = ray.intersectObjects(pickable, false)
  if (!hits.length) { tf.detach(); selSpline = null; selPointIdx = null; renderOutliner(); return }

  const obj = hits[0].object
  const sp  = splines.find(s => s.id === obj.userData.splineId)
  if (!sp) return

  if (obj.userData.isPoint) {
    selSpline    = sp
    selPointIdx  = obj.userData.pointIdx
    tf.attach(obj)
    renderOutliner()
  } else if (obj.userData.isPivot) {
    selectSpline(sp)
  }
})

})

let modelObj = null
document.getElementById('btn-load-glb').onclick = () => document.getElementById('glb-file-input').click()
document.getElementById('glb-file-input').onchange = e => {
  const file = e.target.files[0]; if (!file) return
  const status = document.getElementById('load-status')
  status.textContent = 'Cargando...'
  const url = URL.createObjectURL(file)
  new GLTFLoader().load(url,
    gltf => {
      if (modelObj) scene.remove(modelObj)
      modelObj = gltf.scene; scene.add(modelObj)
      // Normalize to ~6 units
      const box    = new THREE.Box3().setFromObject(modelObj)
      const center = box.getCenter(new THREE.Vector3())
      const size   = box.getSize(new THREE.Vector3())
      const sc     = 6 / Math.max(size.x, size.y, size.z)
      modelObj.scale.setScalar(sc)
      modelObj.position.sub(center.multiplyScalar(sc))
      orbit.target.set(0, 0, 0)
      syncCamToUI()
      status.textContent = `✓ ${file.name}  (×${sc.toFixed(3)})`
      URL.revokeObjectURL(url)
    },
    xhr => { if (xhr.total) status.textContent = `Cargando ${Math.round(xhr.loaded/xhr.total*100)}%…` },
    err => { status.textContent = `Error: ${err.message}` }
  )
}

// ═══════════════════════════════════════════════════
//  CAMERA PARAMS BINDING
// ═══════════════════════════════════════════════════
let camAz = 0, camEl = 30, camDist = 10, camHMult = 0.08

const d2r = d => d * Math.PI / 180

function posFromSpherical () {
  const az = d2r(camAz), el = d2r(camEl)
  const t  = orbit.target
  camera.position.set(
    t.x + camDist * Math.cos(el) * Math.sin(az),
    t.y + camDist * Math.sin(el),
    t.z + camDist * Math.cos(el) * Math.cos(az)
  )
  orbit.update()
}

function syncCamToUI () {
  const off = camera.position.clone().sub(orbit.target)
  camDist   = off.length()
  camAz     = Math.atan2(off.x, off.z) * 180 / Math.PI
  camEl     = Math.asin(Math.max(-1, Math.min(1, off.y / (camDist || 1)))) * 180 / Math.PI
  set('p-dist',      camDist.toFixed(1)); set('v-dist',      camDist.toFixed(1))
  set('p-azimuth',   camAz.toFixed(0));   set('v-azimuth',   camAz.toFixed(0))
  set('p-elevation', camEl.toFixed(0));   set('v-elevation', camEl.toFixed(0))
}

function set (id, v) {
  const el = document.getElementById(id)
  if (!el) return
  if (el.tagName === 'INPUT') el.value = v
  else el.textContent = v
}
function setDisp (id, v) {
  const el = document.getElementById(id)
  if (!el) return
  // Acepta valores con sufijos como "30°" — parseFloat extrae el número
  if (el.tagName === 'INPUT') el.value = parseFloat(v) !== undefined ? parseFloat(v) : v
  else el.textContent = v
}

// bindRange — sincronización bidireccional slider ↔ número editable
function bindRange (rangeId, dispId, fmt, onChange) {
  const range = document.getElementById(rangeId)
  const disp  = document.getElementById(dispId)
  const isEditableInput = disp && disp.tagName === 'INPUT'

  // Slider → display
  const fromSlider = () => {
    const v = parseFloat(range.value)
    if (isEditableInput) disp.value = parseFloat(fmt(v))   // strip units, raw number
    else disp.textContent = fmt(v)
    onChange(v)
  }
  range.addEventListener('input', fromSlider)
  fromSlider()   // inicializar

  // Número tipeado → slider + onChange
  if (isEditableInput) {
    const commit = () => {
      let v = parseFloat(disp.value)
      if (isNaN(v)) { disp.value = parseFloat(range.value); return }
      const mn = parseFloat(range.min), mx = parseFloat(range.max)
      v = Math.max(mn, Math.min(mx, v))
      range.value = v
      disp.value  = parseFloat(fmt(v))
      onChange(v)
    }
    disp.addEventListener('change',  commit)
    disp.addEventListener('keydown', e => { if (e.key === 'Enter') { commit(); disp.blur() } })
  }
}

bindRange('p-rotspeed',  'v-rotspeed',  v => v.toFixed(1), v => orbit.autoRotateSpeed = v)
bindRange('p-dist',      'v-dist',      v => v.toFixed(1), v => { camDist = v; posFromSpherical() })
bindRange('p-azimuth',   'v-azimuth',   v => v.toFixed(0)+'°', v => { camAz = v; posFromSpherical() })
bindRange('p-elevation', 'v-elevation', v => v.toFixed(0)+'°', v => { camEl = v; posFromSpherical() })
bindRange('p-minpolar',  'v-minpolar',  v => v.toFixed(2), v => orbit.minPolarAngle = Math.PI * v)
bindRange('p-maxpolar',  'v-maxpolar',  v => v.toFixed(2), v => orbit.maxPolarAngle = Math.PI * v)
bindRange('p-mindist',   'v-mindist',   v => v.toFixed(2), v => orbit.minDistance = camDist * v)
bindRange('p-maxdist',   'v-maxdist',   v => v.toFixed(2), v => orbit.maxDistance = camDist * v)
bindRange('p-damping',   'v-damping',   v => v.toFixed(2), v => orbit.dampingFactor = v)

document.getElementById('p-autorotate').onchange = e => orbit.autoRotate = e.target.checked;

;['p-tx','p-ty','p-tz'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    orbit.target.set(
      parseFloat(document.getElementById('p-tx').value)||0,
      parseFloat(document.getElementById('p-ty').value)||0,
      parseFloat(document.getElementById('p-tz').value)||0
    )
    posFromSpherical()
  })
})

document.getElementById('btn-snap').onclick = () => {
  if (!modelObj) return
  const box = new THREE.Box3().setFromObject(modelObj)
  const c   = box.getCenter(new THREE.Vector3())
  const s   = box.getSize(new THREE.Vector3())
  orbit.target.copy(c)
  document.getElementById('p-tx').value = c.x.toFixed(4)
  document.getElementById('p-ty').value = c.y.toFixed(4)
  document.getElementById('p-tz').value = c.z.toFixed(4)
  const fp = Math.sqrt(s.x*s.x + s.z*s.z)
  camDist = fp * 1.2 + s.y * 0.5
  document.getElementById('p-dist').value = camDist.toFixed(2)
  setDisp('v-dist', camDist.toFixed(1))
  posFromSpherical()
  orbit.minDistance = camDist * parseFloat(document.getElementById('p-mindist').value)
  orbit.maxDistance = camDist * parseFloat(document.getElementById('p-maxdist').value)
}

document.getElementById('btn-export').onclick = () => {
  // ── Para parámetros con lock activo, usar el valor fijado (no el derivado
  //    por la órbita, que puede haber derivado antes de que el enforcement
  //    lo corrija en el frame). Los params sin lock usan la posición real.
  const off    = camera.position.clone().sub(orbit.target)
  const curDist = off.length()
  const curAz   = Math.atan2(off.x, off.z) * 180 / Math.PI
  const curEl   = Math.asin(Math.max(-1, Math.min(1, off.y / (curDist || 1)))) * 180 / Math.PI
  const t = orbit.target

  // Locked → valor fijado tiene jerarquía. Unlocked → valor actual de la cámara.
  const xDist = paramLocks.dist      !== undefined ? paramLocks.dist      : curDist
  const xAz   = paramLocks.azimuth   !== undefined ? paramLocks.azimuth   : curAz
  const xEl   = paramLocks.elevation !== undefined ? paramLocks.elevation : curEl
  const xTX   = paramLocks.tx        !== undefined ? paramLocks.tx        : t.x
  const xTY   = paramLocks.ty        !== undefined ? paramLocks.ty        : t.y
  const xTZ   = paramLocks.tz        !== undefined ? paramLocks.tz        : t.z

  const config = {
    // ── Renderer ─────────────────────────────────
    renderer: {
      toneMappingExposure: +parseFloat(document.getElementById('p-exposure').value).toFixed(2)
    },

    // ── Cámara ───────────────────────────────────
    // Nota: los valores marcados con locked:true son los autoritativos
    camera: {
      dist:         +xDist.toFixed(4),
      azimuth:      +xAz.toFixed(2),       // grados
      elevation:    +xEl.toFixed(2),       // grados
      camHeightMult: +camHMult.toFixed(3), // multiplicador de altura sobre el modelo
      target: {
        x: +xTX.toFixed(4),
        y: +xTY.toFixed(4),
        z: +xTZ.toFixed(4)
      },
      // Indicador de qué params estaban lockeados al exportar
      _locked: Object.keys(paramLocks).filter(k => paramLocks[k] !== undefined)
    },

    // ── OrbitControls ────────────────────────────
    controls: {
      autoRotate:      document.getElementById('p-autorotate').checked,
      autoRotateSpeed: +parseFloat(document.getElementById('p-rotspeed').value).toFixed(3),
      dampingFactor:   +parseFloat(document.getElementById('p-damping').value).toFixed(3),
      minPolarFactor:  +parseFloat(document.getElementById('p-minpolar').value).toFixed(3),  // × Math.PI
      maxPolarFactor:  +parseFloat(document.getElementById('p-maxpolar').value).toFixed(3),  // × Math.PI
      minDistFactor:   +parseFloat(document.getElementById('p-mindist').value).toFixed(3),   // × dist
      maxDistFactor:   +parseFloat(document.getElementById('p-maxdist').value).toFixed(3)    // × dist
    },

    // ── Partículas (global) ──────────────────────
    particles: {
      shape:     PG.shape,
      flow:      PG.flow,
      flowSpeed: +PG.flowSpeed.toFixed(3),
      size:      +PG.size.toFixed(4),
      scatter:   +PG.scatter.toFixed(4),
      count:     PG.count
    },

    // ── Bloom ────────────────────────────────────
    bloom: {
      strength:  +bloomPass.strength.toFixed(3),
      radius:    +bloomPass.radius.toFixed(3),
      threshold: +bloomPass.threshold.toFixed(3)
    },

    // ── Splines / Rutas de luz ───────────────────
    // Los splines con locked:true tienen jerarquía sobre los no lockeados
    splines: splines.map(sp => ({
      name:       sp.name,
      color:      sp.color,
      locked:     sp.locked,       // ← jerarquía: true = autoritativo
      intensity:  +sp.intensity.toFixed(3),
      exposure:   +sp.exposure.toFixed(3),
      lightOn:    sp.lightOn,
      particleOn: sp.particleOn,
      points: sp.points.map(p => {
        const wp = new THREE.Vector3()
        sp.group.localToWorld(wp.copy(p))
        return { x: +wp.x.toFixed(4), y: +wp.y.toFixed(4), z: +wp.z.toFixed(4) }
      })
    }))
  }

  document.getElementById('export-output').value = JSON.stringify(config, null, 2)
}

// ═══════════════════════════════════════════════════
//  RESIZE & LOOP
// ═══════════════════════════════════════════════════
function onResize () {
  const w = wrap.clientWidth, h = wrap.clientHeight
  camera.aspect = w / h
  camera.updateProjectionMatrix()
  renderer.setSize(w, h)
  bloomComposer.setSize(w, h)
  finalComposer.setSize(w, h)
}
window.addEventListener('resize', onResize)
onResize()

const clock = new THREE.Clock()
;(function loop () {
  requestAnimationFrame(loop)
  const dt = clock.getDelta()
  splines.forEach(sp => sp.tickParticles(dt))

  // ── Transiciones de ruta (fade in / fade out) ──
  for (let i = fadeAnimations.length - 1; i >= 0; i--) {
    const { sp, dir } = fadeAnimations[i]
    const step = FADE_SPEED * dt
    let done = true

    if (dir === 'out') {
      // ─ Fade OUT ─
      if (sp.tubeMesh && sp.tubeMesh.material.emissiveIntensity > 0) {
        sp.tubeMesh.material.emissiveIntensity = Math.max(0, sp.tubeMesh.material.emissiveIntensity - step)
        if (sp.tubeMesh.material.emissiveIntensity > 0) done = false
      }
      sp.lights.forEach(l => {
        l.intensity = Math.max(0, l.intensity - step)
        if (l.intensity > 0) done = false
      })
      if (sp.particlePoints?.material && sp.particlePoints.material.opacity > 0) {
        sp.particlePoints.material.opacity = Math.max(0, sp.particlePoints.material.opacity - step)
        if (sp.particlePoints.material.opacity > 0) done = false
      }
      if (done) {
        sp.lights.forEach(l => sp.group.remove(l)); sp.lights = []
        sp._syncControlPointsVisibility()
        sp.group.visible = false
        fadeAnimations.splice(i, 1)
      }

    } else {
      // ─ Fade IN ─
      const tgtEmissive = sp.lightOn ? sp.exposure : 0.35
      const tgtLight    = sp.intensity * 0.6
      const tgtParticle = 0.92

      if (sp.tubeMesh) {
        if (sp.tubeMesh.material.emissiveIntensity < tgtEmissive) {
          sp.tubeMesh.material.emissiveIntensity = Math.min(tgtEmissive, sp.tubeMesh.material.emissiveIntensity + step)
          if (sp.tubeMesh.material.emissiveIntensity < tgtEmissive) done = false
        }
      }
      sp.lights.forEach(l => {
        if (l.intensity < tgtLight) {
          l.intensity = Math.min(tgtLight, l.intensity + step * 0.6)
          if (l.intensity < tgtLight) done = false
        }
      })
      if (sp.particlePoints?.material) {
        if (sp.particlePoints.material.opacity < tgtParticle) {
          sp.particlePoints.material.opacity = Math.min(tgtParticle, sp.particlePoints.material.opacity + step)
          if (sp.particlePoints.material.opacity < tgtParticle) done = false
        }
      }
      if (done) fadeAnimations.splice(i, 1)
    }
  }

  orbit.update()

  // ── Enforce parámetros bloqueados (resistencia al mouse) ──
  if (Object.keys(paramLocks).length) {
    const off = camera.position.clone().sub(orbit.target)
    let dist  = off.length()
    let az    = Math.atan2(off.x, off.z)
    let el    = Math.asin(Math.max(-1, Math.min(1, off.y / (dist || 1))))
    let dirty = false

    if (paramLocks.dist      !== undefined) { dist = paramLocks.dist;                          dirty = true }
    if (paramLocks.azimuth   !== undefined) { az   = paramLocks.azimuth   * Math.PI / 180;     dirty = true }
    if (paramLocks.elevation !== undefined) { el   = paramLocks.elevation * Math.PI / 180;     dirty = true }
    if (paramLocks.tx        !== undefined) { orbit.target.x = paramLocks.tx;                  dirty = true }
    if (paramLocks.ty        !== undefined) { orbit.target.y = paramLocks.ty;                  dirty = true }
    if (paramLocks.tz        !== undefined) { orbit.target.z = paramLocks.tz;                  dirty = true }

    if (dirty) {
      const t = orbit.target
      camera.position.set(
        t.x + dist * Math.cos(el) * Math.sin(az),
        t.y + dist * Math.sin(el),
        t.z + dist * Math.cos(el) * Math.cos(az)
      )
      camera.lookAt(t)
    }
  }

  // Luz de cámara sigue la posición de la cámara, apunta al target
  if (_camLightOn) {
    camLight.position.copy(camera.position)
    camLight.target.position.copy(orbit.target)
    camLight.target.updateMatrixWorld()
  }

  // ── Selective bloom: ennegrece el modelo → genera glow → mezcla ──
  _darkifyScene()
  bloomComposer.render()
  _restoreScene()
  finalComposer.render()
})()

// Initial render
renderOutliner()
